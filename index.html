<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UrbanDrip Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="dashboard-container">
        <div class="header">
            <h1 class="logo">URBAN<span>DRIP</span></h1>
            <p class="role-text">OWNER DASHBOARD</p>
        </div>

        <div class="status-grid">
            <div class="status-card pending">
                <span class="count">04</span>
                <span class="label">PENDING</span>
            </div>
            <div class="status-card accepted">
                <span class="count">12</span>
                <span class="label">ACCEPTED</span>
            </div>
            <div class="status-card rejected">
                <span class="count">02</span>
                <span class="label">REJECTED</span>
            </div>
        </div>

        <div class="earnings-card">
            <h3>TOTAL EARNINGS</h3>
            <div class="amount">₹12,450.00</div>
            <p class="sub-text">From 24 successful sales</p>
            <button class="withdraw-btn">WITHDRAW FUNDS</button>
        </div>

        <nav class="bottom-nav">
            <div class="nav-item active">🏠</div>
            <div class="nav-item">📦</div>
            <div class="nav-item">➕</div>
            <div class="nav-item">👤</div>
        </nav>
    </div>

    <script src="script.js"></script>
</body>
</html>
